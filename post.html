<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>f00tnotes¹</title>
  <style>
    /* ─── FONTS ─────────────────────────────────────────────── */
    @font-face { font-family: 'Pretendard'; src: url('/fonts/Pretendard-Light.ttf') format('truetype'); font-weight: 300; }
    @font-face { font-family: 'Pretendard'; src: url('/fonts/Pretendard-Regular.ttf') format('truetype'); font-weight: 400; }
    @font-face { font-family: 'Pretendard'; src: url('/fonts/Pretendard-Medium.ttf') format('truetype'); font-weight: 500; }
    @font-face { font-family: 'Pretendard'; src: url('/fonts/Pretendard-SemiBold.ttf') format('truetype'); font-weight: 600; }
    @font-face { font-family: 'Pretendard'; src: url('/fonts/Pretendard-Bold.ttf') format('truetype'); font-weight: 700; }
    @font-face { font-family: 'IBMPlexMono'; src: url('/fonts/IBMPlexMono-Regular.ttf') format('truetype'); font-weight: 400; }
    @font-face { font-family: 'IBMPlexMono'; src: url('/fonts/IBMPlexMono-Bold.ttf') format('truetype'); font-weight: 700; }

    /* ─── TOKENS ────────────────────────────────────────────── */
    :root {
      --bg:          #0C0C0C;
      --bg-raised:   #141414;
      --bg-elevated: #1C1C1C;
      --border-s:    #1E1E1E;
      --border:      #2A2A2A;
      --border-h:    #3A3A3A;
      --text-1:      #F0F0F0;
      --text-2:      #888888;
      --text-3:      #4A4A4A;
      --accent:      #E8F5E0;
      --nav-h:       56px;
      --page-max:    1200px;
      --pad:         48px;
    }

    /* ─── RESET ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Pretendard', -apple-system, 'Apple SD Gothic Neo', sans-serif;
      font-size: 15px;
      font-weight: 400;
      line-height: 1.75;
      color: var(--text-1);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; }

    /* ─── NAV ───────────────────────────────────────────────── */
    nav {
      position: sticky; top: 0; z-index: 100;
      height: var(--nav-h);
      background: var(--bg);
      border-bottom: 1px solid var(--border-s);
      display: flex; align-items: center;
      padding: 0 var(--pad);
    }
    .brand { display: flex; align-items: center; }
    .brand img { height: 22px; width: auto; display: block; }
    .nav-sep { flex: 1; }
    .nav-links { display: flex; gap: 28px; list-style: none; align-items: center; }
    .nav-links a {
      font-family: 'IBMPlexMono', monospace;
      font-size: 11px; font-weight: 400;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-3); transition: color 0.15s;
    }
    .nav-links a:hover { color: var(--text-1); }
    .nav-links a.active { color: var(--text-1); }
    .nav-sub {
      font-family: 'IBMPlexMono', monospace;
      font-size: 11px; font-weight: 400;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-3);
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 4px; cursor: pointer; background: none;
      transition: color 0.15s, border-color 0.15s;
    }
    .nav-sub:hover { color: var(--text-1); border-color: var(--border-h); }

    /* ─── ARTICLE ───────────────────────────────────────────── */
    .article { max-width: 680px; margin: 0 auto; padding: 0 var(--pad); }
    .back {
      display: inline-block;
      margin-top: 48px;
      font-family: 'IBMPlexMono', monospace;
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-3); transition: color 0.15s;
    }
    .back:hover { color: var(--text-1); }

    .art-header { padding: 40px 0; border-bottom: 1px solid var(--border-s); }
    .art-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
    .art-issue {
      font-family: 'IBMPlexMono', monospace;
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--text-3);
    }
    .art-dot { width: 2px; height: 2px; background: var(--text-3); border-radius: 50%; }
    .art-title {
      font-size: 40px; font-weight: 600;
      letter-spacing: -0.03em; line-height: 1.15;
      color: var(--text-1);
    }

    /* ─── 본문 (렌더된 마크다운) ────────────────────────────── */
    .art-body { padding: 48px 0 100px; }
    .art-body > *:first-child { margin-top: 0; }
    .art-body h1 { font-size: 30px; font-weight: 600; letter-spacing: -0.03em; color: var(--text-1); margin: 56px 0 18px; }
    .art-body h2 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-1); margin: 48px 0 16px; }
    .art-body h3 { font-size: 18px; font-weight: 600; color: var(--text-1); margin: 36px 0 12px; }
    .art-body p { font-size: 16px; color: var(--text-2); line-height: 1.9; margin-bottom: 22px; }
    .art-body strong { color: var(--text-1); font-weight: 600; }
    .art-body em { font-style: italic; color: var(--text-1); }
    .art-body a { color: var(--text-1); text-decoration: underline; text-underline-offset: 3px; text-decoration-color: var(--border-h); }
    .art-body a:hover { text-decoration-color: var(--text-1); }
    .art-body ul, .art-body ol { color: var(--text-2); margin: 0 0 22px 20px; line-height: 1.9; }
    .art-body li { margin-bottom: 6px; }
    .art-body blockquote {
      border-left: 2px solid var(--border-h);
      padding-left: 20px; margin: 0 0 22px;
      color: var(--text-2); font-style: italic;
    }
    .art-body code {
      font-family: 'IBMPlexMono', monospace;
      font-size: 0.88em;
      background: var(--bg-elevated);
      border: 1px solid var(--border-s);
      border-radius: 3px;
      padding: 1px 5px;
      color: var(--text-1);
    }
    .art-body pre {
      background: var(--bg-raised);
      border: 1px solid var(--border-s);
      border-radius: 6px;
      padding: 18px 20px;
      overflow-x: auto;
      margin: 0 0 22px;
    }
    .art-body pre code { background: none; border: none; padding: 0; font-size: 13px; line-height: 1.7; }
    .art-body hr { border: none; border-top: 1px solid var(--border-s); margin: 40px 0; }
    .art-body img { max-width: 100%; border-radius: 6px; margin: 8px 0 22px; }

    /* ─── FOOTER ────────────────────────────────────────────── */
    footer {
      max-width: var(--page-max); margin: 0 auto;
      border-top: 1px solid var(--border-s);
      padding: 32px var(--pad);
      display: flex; align-items: center; justify-content: space-between;
    }
    .footer-brand { display: flex; align-items: center; }
    .footer-brand img { height: 20px; width: auto; display: block; }
    .footer-copy {
      font-family: 'IBMPlexMono', monospace;
      font-size: 11px; color: var(--text-3); letter-spacing: 0.04em;
    }
    .footer-links { display: flex; gap: 24px; list-style: none; }
    .footer-links a {
      font-family: 'IBMPlexMono', monospace;
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-3); transition: color 0.15s;
    }
    .footer-links a:hover { color: var(--text-1); }

    /* ─── RESPONSIVE ────────────────────────────────────────── */
    @media (max-width: 900px) { :root { --pad: 24px; } .art-title { font-size: 32px; } }
    @media (max-width: 600px) {
      :root { --pad: 20px; }
      .art-title { font-size: 26px; }
      .art-body p { font-size: 15px; }
      footer { flex-direction: column; gap: 16px; }
    }
  </style>
</head>
<body>

  <!-- ─── NAV ─────────────────────────────────────────────── -->
  <nav>
    <a href="index.html" class="brand"><img src="assets/f00tnotes-logo.png" alt="f00tnotes¹"></a>
    <span class="nav-sep"></span>
    <ul class="nav-links">
      <li><a href="research.html" class="active">Research</a></li>
      <li><a href="about.html">About</a></li>
      <li><button class="nav-sub">Subscribe</button></li>
    </ul>
  </nav>

  <article class="article">

    <a href="research.html" class="back">← Research</a>

    <header class="art-header">
      <div class="art-meta">
        <span class="art-issue" id="art-no">No.</span>
        <span class="art-dot"></span>
        <span class="art-issue" id="art-date"></span>
      </div>
      <h1 class="art-title" id="art-title">Loading</h1>
    </header>

    <div class="art-body" id="art-body">
      <p>불러오는 중…</p>
    </div>

  </article>

  <!-- ─── FOOTER ───────────────────────────────────────────── -->
  <footer>
    <span class="footer-brand"><img src="assets/f00tnotes-logo.png" alt="f00tnotes¹"></span>
    <span class="footer-copy">© 2026</span>
    <ul class="footer-links">
      <li><a href="research.html">Research</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </footer>

  <script src="assets/marked.min.js"></script>
  <script src="assets/site.js"></script>
  <script>renderPost();</script>

</body>
</html>
