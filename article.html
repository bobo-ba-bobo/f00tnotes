<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>f00tnotes¹</title>
  <style>
    @font-face { font-family: 'Pretendard'; src: url('/fonts/Pretendard-Light.ttf') format('truetype'); font-weight: 300; }
    @font-face { font-family: 'Pretendard'; src: url('/fonts/Pretendard-Regular.ttf') format('truetype'); font-weight: 400; }
    @font-face { font-family: 'Pretendard'; src: url('/fonts/Pretendard-Medium.ttf') format('truetype'); font-weight: 500; }
    @font-face { font-family: 'Pretendard'; src: url('/fonts/Pretendard-SemiBold.ttf') format('truetype'); font-weight: 600; }
    @font-face { font-family: 'Pretendard'; src: url('/fonts/Pretendard-Bold.ttf') format('truetype'); font-weight: 700; }
    @font-face { font-family: 'IBMPlexMono'; src: url('/fonts/IBMPlexMono-Regular.ttf') format('truetype'); font-weight: 400; }
    @font-face { font-family: 'IBMPlexMono'; src: url('/fonts/IBMPlexMono-Bold.ttf') format('truetype'); font-weight: 700; }

    :root {
      --bg:#0C0C0C; --bg-raised:#141414; --bg-elevated:#1C1C1C;
      --border-s:#1E1E1E; --border:#2A2A2A; --border-h:#3A3A3A;
      --text-1:#F0F0F0; --text-2:#888888; --text-3:#4A4A4A;
      --accent:#E8F5E0; --nav-h:56px; --pad:48px;
      --col-side:210px; --col-main:680px; --col-gap:52px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{font-family:'Pretendard',-apple-system,'Apple SD Gothic Neo',sans-serif;font-size:15px;font-weight:400;line-height:1.75;color:var(--text-1);background:var(--bg);-webkit-font-smoothing:antialiased;}
    a{text-decoration:none;color:inherit;}

    nav{position:sticky;top:0;z-index:100;height:var(--nav-h);background:var(--bg);border-bottom:1px solid var(--border-s);display:flex;align-items:center;padding:0 var(--pad);}
    .brand img{height:22px;width:auto;display:block;}
    .nav-sep{flex:1;}
    .nav-links{display:flex;gap:28px;list-style:none;align-items:center;}
    .nav-links a{font-family:'IBMPlexMono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-3);transition:color 0.15s;}
    .nav-links a:hover,.nav-links a.active{color:var(--text-1);}
    .nav-sub{font-family:'IBMPlexMono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-3);padding:6px 14px;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:none;transition:color 0.15s,border-color 0.15s;}
    .nav-sub:hover{color:var(--text-1);border-color:var(--border-h);}

    /* shared content width */
    .wrap{max-width:1216px;margin:0 auto;padding:0 var(--pad);}
    .back{display:inline-block;margin-top:44px;font-family:'IBMPlexMono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-3);transition:color 0.15s;}
    .back:hover{color:var(--text-1);}
    .rule{border:none;border-top:1px solid var(--border-s);margin:0;}

    /* 2-column editorial header */
    .art-header{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;padding:40px 0 48px;}
    .art-eyebrow{font-family:'IBMPlexMono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.18em;color:var(--text-2);margin-bottom:22px;}
    .art-title{font-size:44px;font-weight:600;letter-spacing:-0.03em;line-height:1.12;color:var(--text-1);}
    .art-lede{margin-top:24px;font-size:18px;line-height:1.7;color:var(--text-2);}
    .art-tags{margin-top:26px;display:flex;gap:8px;flex-wrap:wrap;}
    .art-tag{font-size:12px;color:var(--text-2);background:var(--bg-elevated);border:1px solid var(--border-s);border-radius:20px;padding:4px 12px;}
    .art-cover{margin:0;aspect-ratio:3/2;border-radius:12px;border:1px solid var(--border);background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;}
    .art-cover img{width:48%;height:auto;display:block;}
    .art-cover.has-photo img{width:100%;height:100%;object-fit:cover;}

    /* labeled meta row */
    .art-metarow{display:flex;gap:54px;padding:22px 0;flex-wrap:wrap;}
    .meta-item{display:flex;flex-direction:column;gap:5px;}
    .meta-label{font-family:'IBMPlexMono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.13em;color:var(--text-3);}
    .meta-val{font-size:14px;color:var(--text-1);}

    /* 3-column reading layout */
    .art-layout{display:grid;grid-template-columns:var(--col-side) minmax(0,1fr);gap:var(--col-gap);align-items:start;padding:44px 0 90px;}
    .side-label{font-family:'IBMPlexMono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:var(--text-3);margin-bottom:16px;}
    .art-toc,.art-author{position:sticky;top:84px;}

    #toc-nav{display:flex;flex-direction:column;}
    .toc-link{display:block;font-size:13px;line-height:1.45;color:var(--text-2);padding:6px 0 6px 14px;border-left:1px solid var(--border-s);transition:color 0.15s,border-color 0.15s;}
    .toc-link:hover{color:var(--text-1);}
    .toc-link.active{color:var(--text-1);border-left-color:var(--accent);}
    .toc-link.lvl3{padding-left:28px;font-size:12.5px;color:var(--text-3);}
    .toc-link.lvl3:hover{color:var(--text-2);}

    .author-name{font-size:15px;font-weight:600;color:var(--text-1);}
    .author-sub{font-family:'IBMPlexMono',monospace;font-size:11px;color:var(--text-3);margin-top:4px;letter-spacing:0.04em;}
    .author-bio{font-size:12.5px;line-height:1.6;color:var(--text-2);margin-top:12px;}

    /* glossary reader hint */
    .gloss-hint{display:flex;align-items:center;gap:10px;margin-bottom:30px;padding:11px 15px;border:1px solid var(--border-s);border-radius:8px;background:var(--bg-raised);font-size:13px;color:var(--text-2);}
    .gloss-hint b{color:var(--text-1);font-weight:600;}
    .gloss-hint-mark{font-family:'IBMPlexMono',monospace;color:var(--accent);border:1px solid var(--border);border-radius:4px;padding:2px 7px;font-size:12px;white-space:nowrap;}

    /* rendered markdown */
    .art-body>*:first-child{margin-top:0;}
    .art-body h1{font-size:30px;font-weight:600;letter-spacing:-0.03em;color:var(--text-1);margin:56px 0 18px;scroll-margin-top:84px;}
    .art-body h2{font-size:24px;font-weight:600;letter-spacing:-0.02em;color:var(--text-1);margin:52px 0 16px;scroll-margin-top:84px;}
    .art-body h3{font-size:18px;font-weight:600;color:var(--text-1);margin:36px 0 12px;scroll-margin-top:84px;}
    .art-body p{font-size:16.5px;color:var(--text-2);line-height:1.9;margin-bottom:22px;}
    .art-body strong{color:var(--text-1);font-weight:600;}
    .art-body em{font-style:italic;color:var(--text-1);}
    .art-body a:not(.gloss){color:var(--text-1);text-decoration:underline;text-underline-offset:3px;text-decoration-color:var(--border-h);}
    .art-body a:not(.gloss):hover{text-decoration-color:var(--text-1);}
    .art-body ul,.art-body ol{color:var(--text-2);margin:0 0 22px 20px;line-height:1.9;}
    .art-body li{margin-bottom:6px;}
    .art-body blockquote{border-left:2px solid var(--border-h);padding-left:20px;margin:0 0 22px;color:var(--text-2);font-style:italic;}
    .art-body code{font-family:'IBMPlexMono',monospace;font-size:0.88em;background:var(--bg-elevated);border:1px solid var(--border-s);border-radius:3px;padding:1px 5px;color:var(--text-1);}
    .art-body pre{background:var(--bg-raised);border:1px solid var(--border-s);border-radius:6px;padding:18px 20px;overflow-x:auto;margin:0 0 22px;}
    .art-body pre code{background:none;border:none;padding:0;font-size:13px;line-height:1.7;}
    .art-body hr{border:none;border-top:1px solid var(--border-s);margin:40px 0;}

    footer{max-width:1216px;margin:0 auto;border-top:1px solid var(--border-s);padding:32px var(--pad);display:flex;align-items:center;justify-content:space-between;}
    .footer-brand img{height:20px;width:auto;display:block;}
    .footer-copy{font-family:'IBMPlexMono',monospace;font-size:11px;color:var(--text-3);letter-spacing:0.04em;}
    .footer-links{display:flex;gap:24px;list-style:none;}
    .footer-links a{font-family:'IBMPlexMono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-3);transition:color 0.15s;}
    .footer-links a:hover{color:var(--text-1);}

    /* responsive: collapse sidebars */
    @media (max-width:1120px){
      .art-layout{grid-template-columns:minmax(0,1fr);}
      .art-toc{display:none;}
    }
    @media (max-width:900px){
      :root{--pad:24px;}
      .art-header{grid-template-columns:1fr;gap:28px;padding:32px 0 36px;}
      .art-cover{order:-1;}
      .art-title{font-size:34px;}
    }
    @media (max-width:600px){
      :root{--pad:20px;}
      .art-title{font-size:28px;}
      .art-lede{font-size:16px;}
      .art-body p{font-size:15.5px;}
      .art-metarow{gap:32px;}
      footer{flex-direction:column;gap:16px;}
    }
  </style>
  <link rel="stylesheet" href="/assets/glossary.css" />
  <script src="/assets/i18n.js"></script>
</head>
<body>

  <nav>
    <a href="/" class="brand"><img src="/assets/f00tnotes-logo.png" alt="f00tnotes¹"></a>
    <span class="nav-sep"></span>
    <ul class="nav-links">
      <li><a href="/research" class="active">Research</a></li>
      <li><a href="/notes">Notes</a></li>
      <li><a href="/about">About</a></li>
      <li><a class="nav-sub" href="https://www.instagram.com/f00tnotes1/" target="_blank" rel="noopener" style="display:inline-block">Instagram</a></li>
      <li><button class="lang-toggle"></button></li>
    </ul>
  </nav>

  <div class="wrap">
    <a href="/research" class="back">← Research</a>

    <header class="art-header">
      <div class="art-head-text">
        <div class="art-eyebrow" id="art-cat">RESEARCH</div>
        <h1 class="art-title" id="art-title">&nbsp;</h1>
        <p class="art-lede" id="art-lede"></p>
        <div class="art-tags" id="art-tags"></div>
      </div>
      <figure class="art-cover has-photo" id="art-cover">
        <img id="art-cover-img" src="/assets/cover-forgetting-problem.svg" alt="" />
      </figure>
    </header>

    <hr class="rule" />
    <div class="art-metarow" id="art-meta"></div>
    <hr class="rule" />

    <div class="art-layout">
      <aside class="art-toc">
        <div class="side-label"><span data-en>Contents</span><span data-ko>목차</span></div>
        <nav id="toc-nav"></nav>
      </aside>

      <main class="art-main">
        <div class="gloss-hint">
          <span class="gloss-hint-mark">term¹</span>
          <span data-en>Underlined terms are <b>f00tnotes</b>. Hover for a quick note, or click to open the full explainer.</span>
          <span data-ko>밑줄 친 용어는 <b>f00tnotes</b>입니다. 마우스를 올리면 짧은 설명이, 클릭하면 전체 설명이 열립니다.</span>
        </div>
        <div class="art-body" id="art-body"><p>Loading…</p></div>
      </main>

    </div>
  </div>

  <footer>
    <span class="footer-brand"><img src="/assets/f00tnotes-logo.png" alt="f00tnotes¹"></span>
    <span class="footer-copy">© 2026</span>
    <ul class="footer-links">
      <li><a href="/research">Research</a></li>
      <li><a href="/about">About</a></li>
    </ul>
  </footer>


  <script src="/assets/marked.min.js"></script>
  <script src="/assets/glossary-data.js"></script>
  <script src="/assets/glossary.js"></script>
  <script>
    (async function () {
      function escHtml(s){return String(s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
      function slugify(s){return s.toLowerCase().replace(/[^a-z0-9가-힣]+/g,'-').replace(/^-+|-+$/g,'');}

      var lang = (window.F00TLang && F00TLang.get && F00TLang.get() === 'ko') ? 'ko' : 'en';

      // slug from /research/<slug> (rewrite) or ?slug=
      var qs = new URLSearchParams(location.search);
      var slug = qs.get('slug') ||
        decodeURIComponent(location.pathname.replace(/\/+$/, '').split('/').pop().replace(/\.html$/, ''));

      function fetchText(url) {
        return fetch(url, { cache: 'no-store' })
          .then(function (r) { return r.ok ? r.text() : ''; })
          .catch(function () { return ''; });
      }
      var fetched = await Promise.all([
        fetchText('/research/posts/' + slug + '.en.md'),
        fetchText('/research/posts/' + slug + '.ko.md'),
        fetchText('/_admin/posts/index.json')
      ]);
      var enMd = fetched[0], koMd = fetched[1];
      // chosen language, falling back to whichever exists
      if (lang === 'ko' && !koMd) lang = 'en';
      else if (lang === 'en' && !enMd) lang = 'ko';
      var raw = (lang === 'ko' ? koMd : enMd) || enMd || koMd;
      if (!raw) {
        document.getElementById('art-body').innerHTML =
          '<p>' + (lang === 'ko' ? '본문을 불러오지 못했습니다.' : 'Could not load this article.') + '</p>';
        return;
      }

      // post meta (cover / author) from the published index
      var meta0 = {};
      try {
        (JSON.parse(fetched[2]) || []).forEach(function (p) {
          if (p.url && p.url.replace(/\/+$/, '').split('/').pop() === slug) meta0 = p;
        });
      } catch (e) {}

      var parts = raw.split(/\n-{3,}\n/);
      var preamble = parts.shift();
      var bodyMd = parts.join('\n\n---\n\n').trim();

      // preamble: title / lede / meta
      var title = '', lede = '', metaLines = [];
      preamble.split('\n').forEach(function (ln) {
        var t = ln.trim();
        if (!t) return;
        if (/^#\s+/.test(t)) { title = t.replace(/^#\s+/, '').trim(); return; }
        if (/^>/.test(t)) { metaLines.push(t.replace(/^>\s?/, '').trim()); return; }
        if (!lede) lede = t;
      });

      if (title) { document.getElementById('art-title').textContent = title; document.title = title + ' - f00tnotes¹'; }
      if (lede) document.getElementById('art-lede').textContent = lede;

      var category = metaLines[0] || 'Research';
      var researchWord = (lang === 'ko') ? '리서치' : 'Research';
      document.getElementById('art-cat').textContent = (researchWord + ' / ' + category).toUpperCase();
      document.getElementById('art-tags').innerHTML =
        '<span class="art-tag">' + escHtml(category) + '</span>';

      // labeled meta row
      var date = '', read = '';
      metaLines.forEach(function (m) {
        var rt = m.match(/Reading Time:\s*(.+)/i); if (rt) read = rt[1].replace('~', '').trim();
        var dr = m.match(/(?:Draft|Updated|Published):\s*(.+)/i); if (dr) date = dr[1].trim();
      });
      var lbl = (lang === 'ko')
        ? { date: '날짜', read: '읽는 시간', author: '글쓴이' }
        : { date: 'Date', read: 'Reading Time', author: 'Author' };
      var meta = [
        { label: lbl.date, val: date || '-' },
        { label: lbl.read, val: read || '-' },
        { label: lbl.author, val: meta0.createdBy || 'Bobo' }
      ];

      // cover from post meta (else keep the default placeholder)
      var coverImg = document.getElementById('art-cover-img');
      var coverWrap = document.getElementById('art-cover');
      if (coverImg && meta0.cover) { coverImg.src = meta0.cover; }
      else if (coverWrap && !meta0.cover) { coverWrap.classList.remove('has-photo'); coverImg && (coverImg.src = '/assets/f00tnotes1%20logo%20white.png'); }
      document.getElementById('art-meta').innerHTML = meta.map(function (m) {
        return '<div class="meta-item"><div class="meta-label">' + escHtml(m.label) +
               '</div><div class="meta-val">' + escHtml(m.val) + '</div></div>';
      }).join('');

      // body
      var bodyEl = document.getElementById('art-body');
      bodyEl.innerHTML = (typeof marked !== 'undefined') ? marked.parse(bodyMd) : ('<pre>' + escHtml(bodyMd) + '</pre>');

      // do not gloss-link the Rundown list
      var heads = bodyEl.querySelectorAll('h1,h2,h3');
      heads.forEach(function (h) {
        if (h.textContent.trim().toLowerCase() === 'rundown') {
          var sib = h.nextElementSibling;
          if (sib && (sib.tagName === 'UL' || sib.tagName === 'OL')) sib.classList.add('no-gloss');
        }
      });

      // glossary
      if (window.F00T) {
        window.F00T.autolink(bodyEl);
        window.F00T.initTooltips(document);
      }

      // build the Contents sidebar from h2 / h3 (skip the Rundown heading)
      var tocNav = document.getElementById('toc-nav');
      var seen = {}, tocHtml = '', tocHeads = [];
      bodyEl.querySelectorAll('h2,h3').forEach(function (h) {
        var text = h.textContent.trim();
        if (/^rundown$/i.test(text)) return;
        var base = slugify(text) || 'section', id = base, n = 1;
        while (seen[id]) id = base + '-' + (++n);
        seen[id] = true; h.id = id;
        tocHeads.push(h);
        tocHtml += '<a class="toc-link ' + (h.tagName === 'H3' ? 'lvl3' : 'lvl2') +
                   '" href="#' + id + '">' + escHtml(text) + '</a>';
      });
      tocNav.innerHTML = tocHtml;

      // active-section highlight
      var links = {};
      tocNav.querySelectorAll('.toc-link').forEach(function (a) { links[a.getAttribute('href').slice(1)] = a; });
      if ('IntersectionObserver' in window) {
        var obs = new IntersectionObserver(function (entries) {
          entries.forEach(function (e) {
            if (e.isIntersecting) {
              Object.keys(links).forEach(function (k) { links[k].classList.remove('active'); });
              if (links[e.target.id]) links[e.target.id].classList.add('active');
            }
          });
        }, { rootMargin: '-84px 0px -68% 0px', threshold: 0 });
        tocHeads.forEach(function (h) { obs.observe(h); });
      }
    })();
  </script>

</body>
</html>
