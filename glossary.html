<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glossary - f00tnotes¹</title>
  <style>
    @font-face { font-family: 'Pretendard'; src: url('/fonts/Pretendard-Light.ttf') format('truetype'); font-weight: 300; }
    @font-face { font-family: 'Pretendard'; src: url('/fonts/Pretendard-Regular.ttf') format('truetype'); font-weight: 400; }
    @font-face { font-family: 'Pretendard'; src: url('/fonts/Pretendard-Medium.ttf') format('truetype'); font-weight: 500; }
    @font-face { font-family: 'Pretendard'; src: url('/fonts/Pretendard-SemiBold.ttf') format('truetype'); font-weight: 600; }
    @font-face { font-family: 'Pretendard'; src: url('/fonts/Pretendard-Bold.ttf') format('truetype'); font-weight: 700; }
    @font-face { font-family: 'IBMPlexMono'; src: url('/fonts/IBMPlexMono-Regular.ttf') format('truetype'); font-weight: 400; }
    @font-face { font-family: 'IBMPlexMono'; src: url('/fonts/IBMPlexMono-Bold.ttf') format('truetype'); font-weight: 700; }

    :root{
      --bg:#0C0C0C; --bg-raised:#141414; --bg-elevated:#1C1C1C;
      --border-s:#1E1E1E; --border:#2A2A2A; --border-h:#3A3A3A;
      --text-1:#F0F0F0; --text-2:#888888; --text-3:#4A4A4A;
      --accent:#E8F5E0; --nav-h:56px; --page-max:1200px; --pad:48px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{font-family:'Pretendard',-apple-system,'Apple SD Gothic Neo',sans-serif;font-size:15px;line-height:1.75;color:var(--text-1);background:var(--bg);-webkit-font-smoothing:antialiased;}
    a{text-decoration:none;color:inherit;}

    nav{position:sticky;top:0;z-index:100;height:var(--nav-h);background:var(--bg);border-bottom:1px solid var(--border-s);display:flex;align-items:center;padding:0 var(--pad);}
    .brand img{height:22px;width:auto;display:block;}
    .nav-sep{flex:1;}
    .nav-links{display:flex;gap:28px;list-style:none;align-items:center;}
    .nav-links a{font-family:'IBMPlexMono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-3);transition:color 0.15s;}
    .nav-links a:hover,.nav-links a.active{color:var(--text-1);}
    .nav-sub{font-family:'IBMPlexMono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-3);padding:6px 14px;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:none;}
    .nav-sub:hover{color:var(--text-1);border-color:var(--border-h);}

    .wrap{max-width:720px;margin:0 auto;padding:0 var(--pad);}
    .back{display:inline-block;margin-top:48px;font-family:'IBMPlexMono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-3);transition:color 0.15s;}
    .back:hover{color:var(--text-1);}

    .g-header{padding:40px 0 30px;border-bottom:1px solid var(--border-s);}
    .g-eyebrow-row{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:20px;}
    .g-eyebrow{font-family:'IBMPlexMono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.18em;color:var(--text-2);}
    .g-diff{font-family:'IBMPlexMono',monospace;font-size:13px;color:var(--accent);letter-spacing:0.12em;}
    .g-title{font-size:40px;font-weight:600;letter-spacing:-0.03em;line-height:1.12;color:var(--text-1);}

    .g-content{padding:34px 0 60px;}
    .g-content .g-lede{font-size:19px;line-height:1.65;color:var(--text-1);font-weight:500;margin-bottom:28px;}
    .g-content p{font-size:16px;color:var(--text-2);line-height:1.9;margin-bottom:20px;}
    .g-content strong{color:var(--text-1);}

    .g-fig{font-family:'IBMPlexMono',monospace;font-size:12.5px;line-height:1.7;color:var(--text-1);background:var(--bg-raised);border:1px solid var(--border-s);border-radius:8px;padding:18px 20px;overflow-x:auto;margin:0 0 28px;white-space:pre;}

    .g-analogy{position:relative;border:none;border-left:2px solid var(--accent);background:var(--bg-raised);border-radius:0 8px 8px 0;padding:16px 18px;margin:6px 0 28px;color:var(--text-1);font-style:normal;font-size:15.5px;line-height:1.7;}
    .g-analogy-label{display:block;font-family:'IBMPlexMono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--text-3);margin-bottom:6px;}

    .g-appears{margin-top:30px;padding-top:20px;border-top:1px solid var(--border-s);font-family:'IBMPlexMono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-3);}
    .g-appears a{color:var(--accent);border-bottom:1px solid transparent;transition:border-color 0.15s;}
    .g-appears a:hover{border-bottom-color:var(--accent);}

    .g-more{margin-top:46px;}
    .g-more-label{font-family:'IBMPlexMono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:var(--text-3);margin-bottom:14px;}
    .g-chips{display:flex;flex-wrap:wrap;gap:8px;}
    .g-chip{font-size:12.5px;color:var(--text-2);border:1px solid var(--border);border-radius:20px;padding:5px 13px;transition:color 0.15s,border-color 0.15s,background 0.15s;}
    .g-chip:hover{color:var(--text-1);border-color:var(--border-h);background:var(--bg-raised);}

    footer{max-width:var(--page-max);margin:0 auto;border-top:1px solid var(--border-s);padding:32px var(--pad);display:flex;align-items:center;justify-content:space-between;}
    .footer-brand img{height:20px;width:auto;display:block;}
    .footer-copy{font-family:'IBMPlexMono',monospace;font-size:11px;color:var(--text-3);letter-spacing:0.04em;}
    .footer-links{display:flex;gap:24px;list-style:none;}
    .footer-links a{font-family:'IBMPlexMono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-3);}
    .footer-links a:hover{color:var(--text-1);}

    @media (max-width:900px){:root{--pad:24px;}.g-title{font-size:32px;}}
    @media (max-width:600px){:root{--pad:20px;}.g-title{font-size:27px;}.g-content .g-lede{font-size:17px;}}
  </style>
</head>
<body>

  <nav>
    <a href="/" class="brand"><img src="/assets/f00tnotes-logo.png" alt="f00tnotes¹"></a>
    <span class="nav-sep"></span>
    <ul class="nav-links">
      <li><a href="/research" class="active">Research</a></li>
      <li><a href="/about">About</a></li>
      <li><button class="nav-sub">Subscribe</button></li>
    </ul>
  </nav>

  <div class="wrap">
    <a href="javascript:history.length>1?history.back():location.assign('/research')" class="back">← Back</a>
    <header class="g-header">
      <div class="g-eyebrow-row">
        <span class="g-eyebrow" id="g-cat">GLOSSARY</span>
        <span class="g-diff" id="g-diff"></span>
      </div>
      <h1 class="g-title" id="g-title">Loading</h1>
    </header>
    <main class="g-content" id="g-content"><p>Loading…</p></main>
  </div>

  <footer>
    <span class="footer-brand"><img src="/assets/f00tnotes-logo.png" alt="f00tnotes¹"></span>
    <span class="footer-copy">© 2026</span>
    <ul class="footer-links">
      <li><a href="/research">Research</a></li>
      <li><a href="/about">About</a></li>
    </ul>
  </footer>

  <script src="/assets/glossary-data.js"></script>
  <script src="/assets/glossary.js"></script>
  <script>window.F00T && window.F00T.renderConceptPage();</script>

</body>
</html>
